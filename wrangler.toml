name = "jundmz"
compatibility_date = "2026-06-20"

# Assets-only Worker (no server code) — Cloudflare serves the static build.
# CI builds ./public with the pinned flake toolchain; `wrangler deploy` uploads it.
# No [build] section on purpose: the GitHub Action does the build, not Cloudflare.
[assets]
directory = "./public"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

